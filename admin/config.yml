backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "images"

collections:
  - name: "blog"
    label: "WhoTookThis Blog Drops"
    folder: "posts"
    create: true
    slug: "{{slug}}"
    format: "json"
    fields:
      - {label: "Unique ID", name: "id", widget: "string"}
      - {label: "Headline Title", name: "title", widget: "string"}
      - {label: "Category", name: "category", widget: "select", options: ["News", "Movie Reviews", "Podcast Clips", "Rumors"]}
      - {label: "Thumbnail Image", name: "image", widget: "image", required: false}
      - {label: "Publish Date", name: "date", widget: "string"}
      - {label: "Source Publication", name: "source", widget: "string", required: false}
      - {label: "Source URL (Optional)", name: "sourceUrl", widget: "string", required: false}
      - {label: "Short Excerpt Summary", name: "excerpt", widget: "text"}
      - {label: "Your WT Take Highlight", name: "wtTake", widget: "text"}
      - {label: "Snappy Bullet Points (Optional)", name: "bulletPoints", widget: "list", required: false}
      - {label: "Detailed Main Story Body", name: "bodyText", widget: "markdown"}
